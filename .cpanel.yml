---
deployment:
  tasks:
    - export DEPLOYPATH=/home/lemg1635/koperasi/
    - export PUBLICPATH=/home/lemg1635/public_html/koperasi/

    # 1. Update Core Laravel
    - /bin/cp -R * $DEPLOYPATH

    # 2. Update Public Files (Tanpa mengganggu folder storage symlink)
    - /usr/bin/rsync -av --exclude='storage' public/ $PUBLICPATH

    # 3. Jalankan Artisan Command & Frontend Build
    - cd $DEPLOYPATH
    - /usr/local/bin/php artisan down
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan optimize:clear
    - /usr/local/bin/php artisan up
    
    # 4. Generate Frontend Assets (Vite)
    # Ini akan menginstall npm packages dan membuild JS/CSS langsung di VPS/cPanel
    - npm run build
    
    # 5. Pindahkan hasil build ke folder public_html
    - /bin/cp -R public/build/ $PUBLICPATH/build/
